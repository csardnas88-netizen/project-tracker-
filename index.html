<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; gap: 30px; }

.phone { width: 300px; height: 580px; background: linear-gradient(160deg, #1a1a2e, #16213e, #0f3460); border-radius: 44px; padding: 14px; box-shadow: 0 30px 80px rgba(0,0,0,.4), inset 0 0 0 2px rgba(255,255,255,.1); position: relative; }
.notch { width: 90px; height: 24px; background: #000; border-radius: 0 0 16px 16px; position: absolute; top: 14px; left: 50%; transform: translateX(-50%); z-index: 10; }
.screen { background: linear-gradient(160deg, #1a1a2e, #0f3460); border-radius: 32px; height: 100%; padding: 50px 16px 20px; display: flex; flex-direction: column; }

/* Status bar */
.status { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.time { color: white; font-size: .85rem; font-weight: 600; }
.status-icons { color: white; font-size: .7rem; display: flex; gap: 4px; align-items: center; }

/* Icons grid */
.icons-grid { display: flex; flex-wrap: wrap; gap: 18px; padding: 10px 4px; }
.app-icon { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 60px; }
.icon-img { width: 58px; height: 58px; border-radius: 14px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; box-shadow: 0 4px 15px rgba(0,0,0,.3); }
.icon-img img { width: 100%; height: 100%; object-fit: cover; }
.icon-img.other { background: rgba(255,255,255,.15); backdrop-filter: blur(10px); }
.icon-label { color: white; font-size: .55rem; text-align: center; text-shadow: 0 1px 3px rgba(0,0,0,.5); font-weight: 500; }

/* Dock */
.dock { margin-top: auto; background: rgba(255,255,255,.15); backdrop-filter: blur(20px); border-radius: 20px; padding: 10px 14px; display: flex; justify-content: space-around; }
.dock-icon { width: 52px; height: 52px; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
.dock-icon.other { background: rgba(255,255,255,.1); }

/* Label */
.label { font-size: .85rem; color: #6b7280; font-weight: 600; text-align: center; }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="screen">
    <div class="status">
      <div class="time">9:41</div>
      <div class="status-icons">●●●● WiFi 🔋</div>
    </div>

    <div class="icons-grid">
      <!-- Your app - HIGHLIGHTED -->
      <div class="app-icon">
        <div class="icon-img" style="box-shadow:0 4px 20px rgba(255,255,255,.3);border:2px solid rgba(255,255,255,.3)">
          <img src="/mnt/user-data/uploads/IMG_6877.jpeg" alt="HK">
        </div>
        <div class="icon-label" style="color:#fff;font-weight:700">Project<br>Tracker</div>
      </div>

      <div class="app-icon">
        <div class="icon-img other">📷</div>
        <div class="icon-label">Camera</div>
      </div>
      <div class="app-icon">
        <div class="icon-img other">📧</div>
        <div class="icon-label">Mail</div>
      </div>
      <div class="app-icon">
        <div class="icon-img other">🗓️</div>
        <div class="icon-label">Calendar</div>
      </div>
      <div class="app-icon">
        <div class="icon-img other">🗺️</div>
        <div class="icon-label">Maps</div>
      </div>
      <div class="app-icon">
        <div class="icon-img other">⚙️</div>
        <div class="icon-label">Settings</div>
      </div>
      <div class="app-icon">
        <div class="icon-img other">📱</div>
        <div class="icon-label">Messages</div>
      </div>
      <div class="app-icon">
        <div class="icon-img other">🎵</div>
        <div class="icon-label">Music</div>
      </div>
    </div>

    <div class="dock">
      <div class="dock-icon other">📞</div>
      <div class="dock-icon other">📱</div>
      <div class="dock-icon other">🌐</div>
      <div class="dock-icon" style="background:rgba(255,255,255,.1);border-radius:12px;overflow:hidden">
        <img src="/mnt/user-data/uploads/IMG_6877.jpeg" style="width:100%;height:100%;object-fit:cover">
      </div>
    </div>
  </div>
</div>

<div class="label">El parche aparece como ícono real<br>en tu iPhone home screen 🏗️</div>

</body>
</html>
